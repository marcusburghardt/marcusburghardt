name: Update README.md

on:
  schedule:
    # Schedule the workflow to run every 6 months (January 1st and July 1st)
    - cron: "0 0 1 1,7 *"
  workflow_dispatch:  # Allow manual trigger
    inputs:
      force:
        description: 'Force update README.md'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: none

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Upgrade pip and setuptools
        run: |
          pip install --upgrade pip
          pip install --upgrade setuptools

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies
        run: pip install pip-audit && pip-audit

      - name: Execute update_readme.py
        run: python cogs/update_readme.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Check if there are any changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update README.md automatically"
            git push
          fi
